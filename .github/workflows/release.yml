name: Compile Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install PlatformIO Core
        run: uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      - name: Build CrossPoint
        run: pio run -e gh_release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CrossPoint-${{ github.ref_name }}
          path: |
            .pio/build/gh_release/bootloader.bin
            .pio/build/gh_release/firmware.bin
            .pio/build/gh_release/firmware.elf
            .pio/build/gh_release/firmware.map
            .pio/build/gh_release/partitions.bin

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSET=".pio/build/gh_release/firmware.bin"
          NAMED="firmware-x4-crosspet-${TAG}.bin"
          cp "$ASSET" "$NAMED"
          gh release create "$TAG" "$NAMED" --title "CrossPet $TAG" --generate-notes || \
          gh release upload "$TAG" "$NAMED" --clobber

      - name: Update landing page firmware
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cp .pio/build/gh_release/firmware.bin site/firmware/firmware.bin
          # Update manifest version
          cat > site/firmware/manifest.json << EOF
          {
            "name": "CrossPet Reader",
            "version": "${VERSION}",
            "new_install_prompt_erase": false,
            "builds": [
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  {
                    "path": "firmware.bin",
                    "offset": 65536
                  }
                ]
              }
            ]
          }
          EOF

      - name: Deploy to GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
