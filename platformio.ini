[platformio]
default_envs = default
extra_configs = platformio.local.ini

[crosspoint]
version = 1.8.3

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# PNG scanline buffer — supports up to 1024px wide images (wider than 800px display)
# Reduced from 16416 (2048px) to save ~32KB stack. Default: (320*4+1)*2=2562
  -DPNG_MAX_BUFFERED_PIXELS=8208
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
# Override mbedtls TLS buffer sizes (default 16KB each = 32KB total).
# ESP32-C3 only has ~46KB free heap after WiFi; TLS needs buffers + handshake state.
# 4KB buffers save ~24KB, enough for TLS on constrained heap.
  -DMBEDTLS_SSL_IN_CONTENT_LEN=4096
  -DMBEDTLS_SSL_OUT_CONTENT_LEN=4096
  -DMBEDTLS_SSL_MAX_CONTENT_LEN=4096
  -fno-exceptions


build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (includes current branch)
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds

[env:ble]
extends = base
build_flags =
  ${base.build_flags}
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DENABLE_BLE=1
# NimBLE tuning — HID central only (receive from page turner remotes)
# Connection limits
  -UCONFIG_BT_NIMBLE_MAX_CONNECTIONS
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  -UCONFIG_NIMBLE_MAX_CONNECTIONS
  -DCONFIG_NIMBLE_MAX_CONNECTIONS=1
  -DCONFIG_BT_NIMBLE_MAX_BONDS=3
# MTU: small — HID reports are ≤20 bytes
  -UCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU
  -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=64
# Disable unused roles to save code+RAM
  -UCONFIG_BT_NIMBLE_ROLE_PERIPHERAL
  -UCONFIG_NIMBLE_ROLE_PERIPHERAL
  -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL_DISABLED
  -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER_DISABLED
# Reduce NimBLE host task stack (HID input is lightweight)
  -UCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE
  -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=2048
  -UCONFIG_BT_NIMBLE_TASK_STACK_SIZE
  -DCONFIG_BT_NIMBLE_TASK_STACK_SIZE=2048
  -UCONFIG_NIMBLE_TASK_STACK_SIZE
  -DCONFIG_NIMBLE_TASK_STACK_SIZE=2048
  -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
# Reduce MSYS buffer pool (default 12×256 = 3KB; we only receive small HID reports)
  -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=4
  -DCONFIG_BT_NIMBLE_MSYS_1_BLOCK_SIZE=128
# HID doesn't use L2CAP Connection-Oriented Channels — disable to save ~1KB
  -DCONFIG_BT_NIMBLE_L2CAP_COC_MAX_NUM=0
# HID doesn't need host flow control (reports are <20B, arrive slowly)
  -DCONFIG_BT_NIMBLE_HS_FLOW_CTRL=0
# Limit scan results to cap memory during discovery
  -DCONFIG_BT_NIMBLE_MAX_SCAN_RESULTS=8
lib_deps =
  ${base.lib_deps}
  h2zero/NimBLE-Arduino @ ^2.1.0


[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds  

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG

; ============================================================
; Murphy (ESP32-S3 + GDEY037T03 / UC8253) build
; ============================================================

[base_s3_murphy]
; S3 platform — same pioarduino release as X4 base
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.mcu = esp32s3
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions-murphy.csv
; Enable PSRAM (Murphy has PSRAM — allows dual-buffer mode)
board_build.arduino.memory_type = qio_opi

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Murphy has PSRAM — no single-buffer constraint
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=8208
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
  -DMBEDTLS_SSL_IN_CONTENT_LEN=4096
  -DMBEDTLS_SSL_OUT_CONTENT_LEN=4096
  -DMBEDTLS_SSL_MAX_CONTENT_LEN=4096
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py

; Exclude X4-specific symlinked display library; UC8253 driver is in lib/hal/
lib_ignore = EInkDisplay

lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

[env:esp32-s3-murphy]
extends = base_s3_murphy
build_flags =
  ${base_s3_murphy.build_flags}
  ; Board + panel identity flags
  -DBOARD_MURPHY=1
  -DPANEL_GDEY037T03=1
  ; Panel geometry: 416 wide × 240 tall (landscape, native UC8253 orientation)
  -DPANEL_WIDTH=416
  -DPANEL_HEIGHT=240
  ; Serial log enabled for development
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2

; Phase-04 bench bringup: minimal EPD hello-world. Excludes main.cpp — the only
; TU is src/murphy-bringup.cpp (gated by MURPHY_BRINGUP). Used for DC↔BUSY pin
; swap resolution + first-light verification. Remove once pinmap is locked.
[env:esp32-s3-murphy-bringup]
extends = base_s3_murphy
build_src_filter =
  -<*>
  +<murphy-bringup.cpp>
build_flags =
  ${base_s3_murphy.build_flags}
  -DBOARD_MURPHY=1
  -DPANEL_GDEY037T03=1
  -DPANEL_WIDTH=416
  -DPANEL_HEIGHT=240
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DMURPHY_BRINGUP=1
